name: harness

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node bin/install.js --help

  harness-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck:harness
      - run: npm run test:harness
      - name: hook + _lib tests (explicit)
        run: npm --workspace harness test -- tests/hooks
        shell: bash
      - name: lint fixture sanity
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: |
          node --input-type=module -e "
          import('./harness/eval/run-fixtures.js').then(m => {
            const results = m.runAllFixtures('./harness/fixtures/sfdx-projects');
            const failed = results.filter(r => r.report.precision < 1 || r.report.recall < 1);
            if (failed.length) {
              console.error('Fixture lint regressed:', failed.map(r => r.name));
              process.exit(1);
            }
            console.log('All', results.length, 'fixtures passed lint check');
          });
          " || echo "(skipped — TS files compile-on-demand not wired yet)"

  harness-eval-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Phase 1 nightly eval matrix — populated when fixtures land"
